name: Nightly encrypted backup (off-site redundans)

# Sekundär backup: krypterad artefakt i GitHub Actions (90 dagars retention).
# PRIMÄR backup körs redan dygnet runt av Railway (ops_worker → Supabase Storage
# bucket "backups"). Denna workflow är extra redundans om Railway/Supabase skulle
# försvinna – inte kritisk för daglig drift.

on:
  schedule:
    - cron: "34 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-encrypted-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install backup dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-backup.txt

      - name: Export and encrypt Supabase data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: python scripts/backup_supabase.py --out backup.enc

      - name: Prove artifact can be decrypted and validated
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: python scripts/restore_backup.py backup.enc

      - name: Upload encrypted artifact (90 days)
        uses: actions/upload-artifact@v7
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backup.enc
          retention-days: 90
          compression-level: 0
          if-no-files-found: error
