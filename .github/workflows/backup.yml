name: Nightly encrypted backup (off-site redundans)

# Sekundär backup: krypterad artefakt i GitHub Actions (90 dagars retention).
# PRIMÄR backup körs redan dygnet runt av Railway (ops_worker → Supabase Storage
# bucket "backups"). Denna workflow är extra redundans om Railway/Supabase skulle
# försvinna – inte kritisk för daglig drift.

on:
  schedule:
    - cron: "34 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backup dependencies
        run: pip install supabase cryptography

      - name: Export and encrypt Supabase data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: python scripts/backup_supabase.py --out backup.enc

      - name: Upload encrypted artifact (90 days)
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_number }}
          path: backup.enc
          retention-days: 90
